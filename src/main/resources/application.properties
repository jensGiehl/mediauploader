spring.application.name=media-uploader
spring.messages.fallback-to-system-locale=false

# Target directory, either relative to the working directory or an absolute path.
app.upload.directory=${UPLOAD_DIRECTORY:Upload}

# Both secrets are required. Supply them through environment variables.
app.security.password=${UPLOAD_PASSWORD}
app.security.cookie-secret=${UPLOAD_COOKIE_SECRET}
app.security.cookie-lifetime=365d
# Enable this when the application is served over HTTPS.
app.security.secure-cookie=${UPLOAD_SECURE_COOKIE:false}

# Large files are buffered on disk instead of being held in application memory.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10GB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10GB}
spring.servlet.multipart.file-size-threshold=2MB

server.error.include-message=never
